name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      - name: Lint (ruff, non-blocking)
        run: |
          ruff check src tests scripts --output-format=github || true

      - name: Run pytest (offline tests only)
        env:
          CRYPTO_INTEL_USE_BERT: "0"   # 加速 + 避免下载 BERT 模型
        run: |
          python -m pytest tests/test_overfitting.py \
                          tests/test_alpha158.py \
                          tests/test_backtest_router.py \
                          tests/test_rd_agent.py \
                          tests/test_http_client.py \
                          tests/test_meta_learner.py \
                          tests/test_smoke.py \
                          -v --tb=short -p no:cacheprovider

      - name: Smoke test (OSS 集成)
        env:
          CRYPTO_INTEL_USE_BERT: "0"
        run: |
          python scripts/smoke_oss_integrations.py

  build-artifact:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate config + db init
        run: |
          pip install -r requirements.txt -q
          python -m src.cli init
          python -m src.cli oss-check
