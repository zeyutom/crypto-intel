name: Daily Data Refresh

on:
  schedule:
    # 每天 UTC 00:30 跑一次 (北京时间 08:30)
    - cron: '30 0 * * *'
  workflow_dispatch:   # 允许在 GitHub UI 手动触发

permissions:
  contents: write   # 需要 commit + push 回仓库

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data pipeline (no LLM - LLM 由本地 Claude CLI 跑, 见 daily.command)
        run: |
          python -m src.cli init
          python -m src.cli all-no-llm

      - name: Commit data updates
        run: |
          git config user.email "actions@github.com"
          git config user.name "Crypto Intel Daily Refresh"
          git add data/intel.db data/reports/ || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🔄 Daily data refresh $(date -u +%Y-%m-%d_%H:%M)"
            git push
          fi
